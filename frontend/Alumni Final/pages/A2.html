<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CareerNest — Referral Requests</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../Styles/A2.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-name">CareerNest</div>
        <div class="brand-sub">Alumni</div>
      </div>
      <a href="A3.html" class="sidebar-profile" title="My Profile">
        <div class="avatar avatar--light">SR</div>
        <div class="profile-info">
          <div class="profile-name">Sneha Reddy</div>
          <div class="profile-email">sneha@google.com</div>
          <div class="profile-company">Google</div>
        </div>
      </a>
      <nav class="sidebar-nav">
        <a href="A1.html" class="nav-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffffe6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="A2.html" class="nav-btn active">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Referral Requests
        </a>
        <a href="../../login.html" class="nav-btn signout" onclick="event.preventDefault();document.getElementById('signout-modal').style.display='flex'">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffffe6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <header class="topbar">
        <h1 class="page-title">Referral Requests</h1>

        <!-- Search Bar -->
        <div class="search-container">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search by name, year, dept, or cgpa..." />
        </div>
      </header>

      <div class="tabs" id="filter-tabs"></div>
      <div class="cards" id="cards"></div>
    </main>
  </div>

  <!-- Resume Popup Modal -->
  <div class="resume-modal-overlay" id="resume-modal" onclick="if(event.target===this)this.style.display='none'">
    <div class="resume-modal">
      <div class="resume-modal-header">
        <div class="resume-modal-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e76a00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Candidate Resume
        </div>
        <div class="resume-modal-actions-top">
          <a href="test_resume.pdf" download class="resume-download-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </a>
          <button class="resume-modal-close" onclick="document.getElementById('resume-modal').style.display='none'">&times;</button>
        </div>
      </div>
      <div class="resume-modal-body">
        <iframe src="test_resume.pdf" class="resume-iframe"></iframe>
      </div>
    </div>
  </div>

  <!-- Sign Out Confirmation Modal -->
  <div class="signout-overlay" id="signout-modal" onclick="if(event.target===this)this.style.display='none'">
    <div class="signout-popup">
      <div class="signout-icon-wrap">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#e76a00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
      <div class="signout-title">Sign Out</div>
      <div class="signout-msg">Are you sure you want to sign out of CareerNest?</div>
      <div class="signout-btns">
        <button class="signout-cancel" onclick="document.getElementById('signout-modal').style.display='none'">Cancel</button>
        <button class="signout-confirm" onclick="window.location.href='../../login.html'">Sign Out</button>
      </div>
    </div>
  </div>

  <script src="../Data/alumni_data.js"></script>
  <script src="../Js/A2.js" defer></script>
</body>
</html>

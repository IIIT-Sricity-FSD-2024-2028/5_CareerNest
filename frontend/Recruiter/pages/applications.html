<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications - Recruiter</title>
    
    <!-- COMMON CSS -->
    <link rel="stylesheet" href="../Style/style.css">
    <!-- PAGE CSS -->
    <link rel="stylesheet" href="../Style/applications-style.css">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- SIDEBAR -->
    <aside>
        <div>
        <h1>CareerNest</h1>
        <p>Recruiter</p>

        <a href="profile.html" style="text-decoration: none; color: inherit;">
            <div class="profile" style="cursor: pointer; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
                <div class="avatar">PK</div>
                <div>
                <p>Priya Kapo</p>
                <p class="email">priya12@gmail.com</p>
                </div>
            </div>
        </a>

        <nav>
            <ul>
            <li><a href="index.html" style="display:flex; align-items:center; gap:10px;"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
            <li><a href="post.html" style="display:flex; align-items:center; gap:10px;"><i data-lucide="send"></i> Post Opportunity</a></li>
            <li><a href="myopportunities.html" style="display:flex; align-items:center; gap:10px;"><i data-lucide="briefcase"></i> My Opportunities</a></li>
            <li class="active"><a href="applications.html" style="display:flex; align-items:center; gap:10px;"><i data-lucide="users"></i> Applications</a></li>
            <li><a href="assessments.html" style="display:flex; align-items:center; gap:10px;"><i data-lucide="calendar-check"></i> Assessments</a></li>
            </ul>
        </nav>
        </div>
        
        <a href="../../login.html" class="logout" style="text-decoration: none; color: white; display: block; padding: 10px; text-align: center; border-radius: 8px; background: rgba(255,255,255,0.1);">Sign Out</a>
    </aside>

    <main class="main-content" style="padding: 24px;">
        <!-- NAVBAR -->
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="font-size: 24px; font-weight: 600;">Applications</h2>
        <div class="nav-right" style="position: relative; display: flex; gap: 15px;">
            <div style="position: relative;">
            <a href="#" onclick="document.getElementById('notifMenu').classList.toggle('show')" style="color: #6A7282; display: flex; align-items: center; margin-top:5px;"><i data-lucide="bell"></i></a>
            <div id="notifMenu" class="dropdown-menu">
                <h4>Notifications</h4>
                <hr>
                <p>No new notifications right now.</p>
            </div>
            </div>
            <div style="position: relative;">
            <div class="avatar small" style="cursor: pointer;" onclick="document.getElementById('profileMenu').classList.toggle('show')">PK</div>
            <div id="profileMenu" class="dropdown-menu">
                <h4>Priya Kapo</h4>
                <p style="font-size:12px; color:#6B7280;">priya12@gmail.com</p>
                <hr>
                <a href="profile.html" style="color: #374151; display: block; margin-bottom: 8px;">My Profile</a>
                <a href="login.html" style="color:#DC2626; display: block;">Sign Out</a>
            </div>
            </div>
        </div>
        </header>

        <div class="search-filter-row" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <div class="search-container" style="flex: 1; max-width: 400px; position: relative; display: flex; align-items: center;">
                <span class="search-icon-placeholder" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9CA3AF; display: flex;"><i data-lucide="search" style="width: 18px; height: 18px;"></i></span>
                <input type="text" id="candidate-search" placeholder="Search candidate..." style="width: 100%; padding: 10px 10px 10px 38px; border: 1px solid #E5E7EB; border-radius: 6px; outline: none;">
            </div>
            <select id="appFilterSelect" class="btn-filter" style="background: white; border: 1px solid #E5E7EB; padding: 10px 16px; border-radius: 6px; cursor: pointer; outline: none; appearance: auto;">
                <option value="all">All Applications</option>
                <option value="referred">Referred Applications</option>
            </select>
        </div>

        <p class="application-count" id="app-count-text" style="color: #6B7280; font-size: 14px; margin-bottom: 15px;">3 applications</p>

        <section class="applications-list" id="applications-container" style="display: flex; flex-direction: column; gap: 15px;">
            <!-- Applications will be rendered here dynamically -->
        </section>
    </main>

    <!-- Candidate Detail Modal -->
    <div id="candidate-modal" class="modal-overlay">
        <div class="modal-content">
            <!-- Content will be injected by script -->
        </div>
    </div>

    <!-- INITIALIZE LUCIDE -->
    <script>lucide.createIcons();</script>
    
    <!-- APPLICATION SCRIPT (ES module — imports from ../data/) -->
    <script type="module" src="../js/applications-script.js"></script>
</body>
</html>

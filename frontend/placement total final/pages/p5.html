<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CareerNest - User Oversight</title>
    <link rel="stylesheet" href="../styles/p1.css" />
    <link rel="stylesheet" href="../styles/p5.css" />
    <style>
        /* Overriding inline dark backgrounds for User Oversight */
        .modal {
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .modal-header h3 {
            color: #1e2939; 
            font-size: 1.25rem;
        }
    </style>
</head>

<body>
    <div class="frame">

        <nav class="sidebar">

            <div class="sidebar-brand">
                <h2>CareerNest</h2>
                <span>Placement Officer</span>
            </div>

            <ul class="sidebar-nav">
                <li class="nav-item" onclick="location.href='p1.html'"><span>Dashboard</span></li>
                <li class="nav-item" onclick="location.href='p2.html'"><span>Review Opportunities</span></li>
                <li class="nav-item" onclick="location.href='p3.html'"><span>Statistics</span></li>
                <li class="nav-item" onclick="location.href='p4.html'"><span>Recruiters</span></li>
                <li class="nav-item active" onclick="location.href='p5.html'"><span>User Oversight</span></li>
                <li class="nav-item" onclick="location.href='p6.html'"><span>App Tracking</span></li>
            </ul>

            <!-- ✅ FIXED SIGNOUT -->
            <div class="sidebar-signout">
                <a href="../../login.html" style="text-decoration:none; color:inherit;">
                    <span>Sign Out</span>
                </a>
            </div>

        </nav>

        <header class="header">
            <div class="header-title">User Oversight</div>

            <div class="header-profile">
                <div class="profile-dropdown">

                    <a class="profile-dd-item" onclick="location.href='p1.html?view=profile'">
                        My Profile
                    </a>

                    <!-- ✅ FIXED SIGNOUT -->
                    <a class="profile-dd-item signout" href="../../login.html">
                        Sign Out
                    </a>

                </div>
            </div>
        </header>

        <!-- ═══ Main Content ═══ -->
        <main class="main-content" id="mainContent">
            <div class="filter-tabs">
                <button class="tab active" onclick="switchUserTab('candidates', this)">Candidates</button>
                <button class="tab" onclick="switchUserTab('alumni', this)">Alumni & Referrals</button>
                <button class="tab" onclick="switchUserTab('recruiters', this)">Recruiters</button>
            </div>
            
            <div class="panel fade-in" id="userListContainer" style="margin-top:20px; padding:20px; border-radius:14px;">
                <div class="table-header-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 id="tableTitle" style="color:#1e2939; font-size:1.125rem;">Manage Candidates</h3>
                    <div class="table-actions" style="display:flex; gap:12px;">
                        <input type="text" class="search-input" placeholder="Search by name or email..." id="userSearch" onkeyup="filterUsers()" style="padding:0.6rem; border-radius:8px; border:1px solid #d1d5db; background:#fff; color:#1e2939;">
                        <button class="btn btn-primary" onclick="openAddUserModal()" style="padding:0.6rem 1rem; border-radius:8px; background:linear-gradient(135deg, #7c3aed, #a855f7); color:#fff; border:none; cursor:pointer; font-weight:600;">+ Add User</button>
                    </div>
                </div>
                <div id="usersTableWrapper" class="table-wrapper" style="overflow-x:auto;">
                    <!-- Table injected by JS -->
                </div>
            </div>
        </main>

        <!-- Add User Modal -->
        <div class="modal-overlay" id="userModal">
            <div class="modal">
                <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 id="modalTitle">Edit User</h3>
                    <button class="modal-close" onclick="closeUserModal()" style="background:transparent; border:none; font-size:24px; cursor:pointer;">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editUserId">
                    <div class="form-group" style="margin-bottom:15px;">
                        <label style="font-weight:600; font-size:13px; color:#374151;">Full Name</label>
                        <input type="text" id="userName" class="form-input" placeholder="Enter full name" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                    </div>
                    <div class="form-group" style="margin-bottom:15px;">
                        <label style="font-weight:600; font-size:13px; color:#374151;">Email</label>
                        <input type="email" id="userEmail" class="form-input" placeholder="Enter email address" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                        <div id="emailError" style="color:#ef4444; font-size:12px; margin-top:4px; display:none;">Please enter a valid Email.</div>
                    </div>
                    <div class="form-group" style="margin-bottom:15px;">
                        <label style="font-weight:600; font-size:13px; color:#374151;">Status</label>
                        <select id="userStatus" class="form-input" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>

                    <!-- Candidate Specific Fields -->
                    <div id="candidateFields" style="display: none;">
                        <div class="form-group" style="margin-bottom:15px;">
                            <label style="font-weight:600; font-size:13px; color:#374151;">Roll No</label>
                            <input type="text" id="userRoll" class="form-input" placeholder="e.g. B22CS012" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                        </div>
                        <div class="form-group" style="margin-bottom:15px;">
                            <label style="font-weight:600; font-size:13px; color:#374151;">Branch</label>
                            <select id="userBranch" class="form-input" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                                <option value="">Select Branch</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Mechanical">Mechanical</option>
                                <option value="Civil">Civil</option>
                                <option value="IT">IT</option>
                            </select>
                        </div>
                        <div style="display: flex; gap: 15px; margin-bottom:15px;">
                            <div class="form-group" style="flex: 1;">
                                <label style="font-weight:600; font-size:13px; color:#374151;">CGPA</label>
                                <input type="number" id="userCgpa" class="form-input" step="0.01" min="0" max="10" placeholder="e.g. 8.5" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label style="font-weight:600; font-size:13px; color:#374151;">Backlogs</label>
                                <input type="number" id="userBacklogs" class="form-input" min="0" placeholder="e.g. 0" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                            </div>
                        </div>
                    </div>

                    <!-- Alumni Specific Fields -->
                    <div id="alumniFields" style="display: none;">
                        <div class="form-group" style="margin-bottom:15px;">
                            <label style="font-weight:600; font-size:13px; color:#374151;">Company</label>
                            <input type="text" id="userCompany" class="form-input" placeholder="e.g. Google" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                        </div>
                        <div class="form-group" style="margin-bottom:15px;">
                            <label style="font-weight:600; font-size:13px; color:#374151;">Role</label>
                            <input type="text" id="userRole" class="form-input" placeholder="e.g. Software Engineer" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                        </div>
                        <div style="display: flex; gap: 15px; margin-bottom:15px;">
                            <div class="form-group" style="flex: 1;">
                                <label style="font-weight:600; font-size:13px; color:#374151;">Batch</label>
                                <input type="text" id="userBatch" class="form-input" placeholder="e.g. 2022" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label style="font-weight:600; font-size:13px; color:#374151;">Referrals</label>
                                <input type="number" id="userReferrals" class="form-input" min="0" placeholder="e.g. 0" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                            </div>
                        </div>
                    </div>

                    <!-- Recruiter Specific Fields -->
                    <div id="recruiterFields" style="display: none;">
                        <div class="form-group" style="margin-bottom:15px;">
                            <label style="font-weight:600; font-size:13px; color:#374151;">Company</label>
                            <input type="text" id="recruiterCompany" class="form-input" placeholder="e.g. Microsoft" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                        </div>
                        <div class="form-group" style="margin-bottom:15px;">
                            <label style="font-weight:600; font-size:13px; color:#374151;">Role</label>
                            <input type="text" id="recruiterRole" class="form-input" placeholder="e.g. Senior Recruiter" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                        </div>
                        <div style="display: flex; gap: 15px; margin-bottom:15px;">
                            <div class="form-group" style="flex: 1;">
                                <label style="font-weight:600; font-size:13px; color:#374151;">Phone</label>
                                <input type="text" id="recruiterPhone" class="form-input" placeholder="e.g. +91 98765 43210" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label style="font-weight:600; font-size:13px; color:#374151;">Location</label>
                                <input type="text" id="recruiterLocation" class="form-input" placeholder="e.g. Bangalore" style="width:100%; border:1px solid #d1d5db; border-radius:8px; padding:10px; margin-top:5px;">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-actions" style="margin-top: 20px; text-align:right;">
                    <button class="modal-btn-cancel" onclick="closeUserModal()" style="padding:10px 16px; border-radius:8px; border:1px solid #d1d5db; background:#fff; cursor:pointer;">Cancel</button>
                    <button class="modal-btn-confirm" onclick="saveUser()" style="padding:10px 16px; border-radius:8px; border:none; background:linear-gradient(135deg, #7c3aed, #a855f7); color:#fff; cursor:pointer; margin-left:10px;">Save Changes</button>
                </div>
            </div>
        </div>

    </div>

    <!-- JavaScript Files -->
    <script src="../js files/mockdata.js"></script>
    <script src="../js files/p5.js"></script>
    <script>
        function toggleProfileDropdown(e){
            e.stopPropagation();
            var p = document.getElementById('profileDropdown');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }
        document.addEventListener('click', function(e) {
            var p = document.getElementById('profileDropdown');
            if (p && !e.target.closest('.header-profile')) {
                p.style.display = 'none';
            }
        });
    </script>
</body>
</html>
